---
# ==============================================================================
# PLAY 1: Dynamically Map Terraform Output IPs
# ==============================================================================
- name: Parse Terraform Inputs and Create Dynamic Host Groups
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Add Web Instance to In-Memory Inventory
      ansible.builtin.add_host:
        name: "{{ web_node_ip }}"
        groups: webservers
        ansible_user: ec2-user

    - name: Add DB Instance to In-Memory Inventory
      ansible.builtin.add_host:
        name: "{{ db_node_ip }}"
        groups: databases
        ansible_user: ec2-user

# ==============================================================================
# PLAY 2: Configure Database Tier (PostgreSQL 16)
# ==============================================================================
- name: Provision RHEL 9 PostgreSQL Database Server
  hosts: databases
  become: true
  tasks:
    - name: Install PostgreSQL 16 server packages via AppStream
      ansible.builtin.dnf:
        name: "@postgresql:16/server"
        state: present

    - name: Install firewalld for database ingress control
      ansible.builtin.dnf:
        name: firewalld
        state: present

    - name: Check if PostgreSQL database is initialized
      ansible.builtin.stat:
        path: /var/lib/pgsql/data/PG_VERSION
      register: pg_initialized

    - name: Initialize PostgreSQL database engine
      ansible.builtin.command: postgresql-setup --initdb
      when: not pg_initialized.stat.exists

    - name: Allow PostgreSQL to listen on all interfaces
      ansible.builtin.lineinfile:
        path: /var/lib/pgsql/data/postgresql.conf
        regexp: "^#?listen_addresses\\s*="
        line: "listen_addresses = '*'"
      notify: Restart postgresql

    #- name: Authorize ingress MD5 authentication from the Web tier IP
    #  ansible.builtin.lineinfile:
    #    path: /var/lib/pgsql/data/pg_hba.conf
    #    line: "host all all {{ hostvars['localhost']['web_node_ip'] }}/32 md5"
    #  notify: Restart postgresql
    #####FIX#########

    # NEW TASK (Trusts Internal Private VPC Subnet)
    - name: Authorize ingress authentication from the internal VPC network
      ansible.builtin.lineinfile:
        path: /var/lib/pgsql/data/pg_hba.conf
        line: "host all all 10.0.0.0/16 scram-sha-256"
      notify: Restart postgresql

    - name: Ensure firewalld is running
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Permit inbound database connections on firewalld
      ansible.posix.firewalld:
        service: postgresql
        permanent: true
        state: enabled
        immediate: true

    - name: Start and enable PostgreSQL service
      ansible.builtin.systemd:
        name: postgresql
        state: started
        enabled: true

    # Required so Ansible DB modules can communicate with PostgreSQL
    - name: Install Python Pg adapter
      ansible.builtin.dnf:
        name: python3-psycopg2
        state: present

    - name: Generate the secure web app user inside Postgres
      community.postgresql.postgresql_user:
        name: weather_user
        password: "SuperSecurePassword123!"
        state: present
      become: true
      become_user: postgres

    - name: Create the Weather dashboard application database
      community.postgresql.postgresql_db:
        name: weather_db
        owner: weather_user
        state: present
      become: true
      become_user: postgres

  handlers:
    - name: Restart postgresql
      ansible.builtin.systemd:
        name: postgresql
        state: restarted

# ==============================================================================
# PLAY 3: Configure Web/App Tier (Python 3.11, Gunicorn, Nginx & SELinux)
# ==============================================================================
- name: Provision RHEL 9 Web & Application Server
  hosts: webservers
  become: true
  tasks:
    - name: Install system dependencies from RHEL 9 repositories
      ansible.builtin.dnf:
        name:
          - python3.11
          - python3.11-pip
          - python3.11-devel
          - gcc
          - git
          - nginx
          - firewalld
        state: present

    - name: Ensure firewalld is running
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Open Web ports on firewalld
      ansible.posix.firewalld:
        service: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - http
        - https

    - name: Create application deployment directory
      ansible.builtin.file:
        path: /var/www/weather-app
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Clone Weather application source from repository
      ansible.builtin.git:
        repo: 'https://github.com/benfor76/demo-Terraform-Actions-AAP-Weather.git'
        dest: /var/www/weather-app
        version: main
        force: true
      become: false # Run as ec2-user to preserve permissions

    - name: Build Python 3.11 Virtual Environment and install framework deps
      ansible.builtin.pip:
        name:
          - django
          - gunicorn
          - psycopg2-binary
          - requests
        virtualenv: /var/www/weather-app/venv
        virtualenv_command: /usr/bin/python3.11 -m venv
      become: false

    - name: Generate production environment configuration (.env)
      ansible.builtin.copy:
        dest: /var/www/weather-app/.env
        mode: '0600'
        owner: ec2-user
        content: |
          DEBUG=False
          SECRET_KEY="demo-secret-key-aap-terraform"
          DB_NAME=weather_db
          DB_USER=weather_user
          DB_PASSWORD=SuperSecurePassword123!
          DB_HOST={{ hostvars['localhost']['db_node_ip'] }}
          DB_PORT=5432
          WEATHER_API_KEY={{ hostvars['localhost']['weather_api_key'] }} # <-- THE FINAL PIECE

    # Add this task right before the Django database migrations task
    - name: Ensure manage.py is executable
      ansible.builtin.file:
        path: /var/www/weather-app/manage.py
        mode: '0755'
      become: false # Keeps file ownership as ec2-user

    # Run Database Migrations to auto-generate the Django Schema in PostgreSQL
    - name: Run Django database migrations
      ansible.builtin.django_manage:
        command: migrate
        project_path: /var/www/weather-app
        virtualenv: /var/www/weather-app/venv
      become: false

    - name: Collect static assets
      ansible.builtin.django_manage:
        command: collectstatic
        project_path: /var/www/weather-app
        virtualenv: /var/www/weather-app/venv
      become: false

    - name: Configure Gunicorn Systemd Unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/gunicorn.service
        content: |
          [Unit]
          Description=Gunicorn process manager for Weather App
          After=network.target

          [Service]
          User=ec2-user
          Group=nginx
          WorkingDirectory=/var/www/weather-app
          ExecStart=/var/www/weather-app/venv/bin/gunicorn --workers 3 --bind 127.0.0.1:8000 weather_project.wsgi:application

          [Install]
          WantedBy=multi-user.target
      notify: Force refresh Gunicorn process application state

    # Enterprise Hardening Showcase: SELinux Configuration
    #- name: Allow Nginx to connect upstream over network socket
    #  ansible.posix.seboolean:
    #    name: httpd_can_network_connect
    #    state: true
    #    persistent: true

    - name: Allow Nginx to connect upstream over network socket
      ansible.builtin.command: setsebool -P httpd_can_network_connect 1
      changed_when: false

    #- name: Set SELinux context on Static Assets folder for Nginx readability
    #  community.general.sefcontext:
    #    target: '/var/www/weather-app/static(/.*)?'
    #    setype: httpd_sys_content_t
    #    state: present
    #  register: static_secontext

    # NEW FIXED TASKS (Uses native RHEL core utilities)
    - name: Configure SELinux contexts for Nginx web visibility
      ansible.builtin.command: "{{ item }}"
      loop:
        - semanage fcontext -a -t httpd_sys_content_t "/var/www/weather-app/static(/.*)?"
        - restorecon -R /var/www/weather-app/static
      failed_when: false # Prevents crashing if the rule already exists in the SELinux policy
      changed_when: false

    # --- ADD THIS NEW TASK TO ALLOW SYSTEMD TO LAUNCH GUNICORN ---
    - name: Configure SELinux contexts for Gunicorn Execution (Venv Binaries)
      ansible.builtin.command: "{{ item }}"
      loop:
        - semanage fcontext -a -t bin_t "/var/www/weather-app/venv/bin(/.*)?"
        - restorecon -R /var/www/weather-app/venv/bin
      failed_when: false
      changed_when: false

    - name: Write Nginx reverse-proxy deployment block
      ansible.builtin.copy:
        dest: /etc/nginx/conf.d/weather.conf
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:8000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }

              location /static/ {
                  alias /var/www/weather-app/static/;
              }
          }
      notify: Restart nginx

    - name: Start Web Services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
        daemon_reload: true # <-- THE FIX: Forces systemd to parse the new gunicorn file immediately
      loop:
        - nginx

  handlers:
    - name: Force refresh Gunicorn process application state
      ansible.builtin.systemd:
        name: gunicorn
        state: restarted
        enabled: true
        daemon_reload: true

    - name: Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted

# ==============================================================================
# PLAY 4: Smoke Test the Deployment
# ==============================================================================
- name: Execute End-to-End Smoke Test
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Query application homepage with retries
      ansible.builtin.uri:
        url: "http://{{ web_node_ip }}/"
        return_content: true
        status_code: 200
        timeout: 10
      register: web_smoke_test
      retries: 6
      delay: 15
      until: web_smoke_test.status == 200

    - name: Verify application dashboard contents
      ansible.builtin.assert:
        that:
          - "'Weather' in web_smoke_test.content"
        fail_msg: "Demo Verification Failed: Site responded, but weather metadata is missing."
        success_msg: "DEMO SUCCESSFUL: Weather Application is active and verified at http://{{ web_node_ip }}/"
